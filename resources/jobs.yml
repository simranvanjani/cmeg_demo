resources:
  jobs:
    cmeg_orchestrator:
      name: cmeg_orchestrator
      tasks:
        - task_key: dlt_medallion
          pipeline_task:
            pipeline_id: ${resources.pipelines.cmeg_dlt_pipeline.id}
        - task_key: features_and_vectors
          depends_on:
            - task_key: dlt_medallion
          notebook_task:
            notebook_path: ../02-Features-and-Vectors.py
          job_cluster_key: demo_cluster
        - task_key: train_and_register
          depends_on:
            - task_key: features_and_vectors
          notebook_task:
            notebook_path: ../03-Train-and-Register.py
          job_cluster_key: demo_cluster
        - task_key: serve_and_explain
          depends_on:
            - task_key: train_and_register
          notebook_task:
            notebook_path: ../04-Serve-and-Explain.py
          job_cluster_key: demo_cluster
        - task_key: monitor_and_govern
          depends_on:
            - task_key: serve_and_explain
          notebook_task:
            notebook_path: ../05-Monitor-and-Govern.py
          job_cluster_key: demo_cluster
        - task_key: genie_space
          depends_on:
            - task_key: monitor_and_govern
          notebook_task:
            notebook_path: ../06-Genie-Space.py
          job_cluster_key: demo_cluster
      job_clusters:
        - job_cluster_key: demo_cluster
          new_cluster:
            spark_version: ${var.dbr_version}
            node_type_id: ${var.node_type}
            num_workers: 1
            data_security_mode: SINGLE_USER
            runtime_engine: PHOTON

    cmeg_cleanup:
      name: cmeg_cleanup
      tasks:
        - task_key: uninstall
          notebook_task:
            notebook_path: ../_resources/99-uninstall.py
          job_cluster_key: demo_cluster
      job_clusters:
        - job_cluster_key: demo_cluster
          new_cluster:
            spark_version: ${var.dbr_version}
            node_type_id: ${var.node_type}
            num_workers: 1
            data_security_mode: SINGLE_USER
            runtime_engine: PHOTON
