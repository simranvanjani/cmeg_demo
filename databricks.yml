bundle:
  name: cmeg_demo

variables:
  catalog_name:
    description: "UC catalog (must exist or you must have CREATE CATALOG privileges)"
    default: main
  schema_name:
    description: "Schema where all demo tables live (created if missing)"
    default: cmeg_demo
  dbr_version:
    default: 15.4.x-cpu-ml-scala2.12
  node_type:
    description: "Cluster node type (Azure default; override per cloud)"
    default: Standard_D4ds_v5

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: DEFAULT
    run_as:
      user_name: ${workspace.current_user.userName}
